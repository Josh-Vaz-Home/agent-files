name: Claude

# Comment "@claude ..." on an issue or PR conversation (or open an issue containing @claude) and
# Claude Code runs on an isolated GitHub-hosted runner, implements it, and opens a PR.
# Only a repo OWNER/MEMBER/COLLABORATOR can trigger the job; bot/outsider events are skipped.
# Auth: Max-plan OAuth token (no API billing). Model: Opus 4.8. Third-party actions SHA-pinned.
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read      # let @claude read CI run logs when asked to diagnose a failure
      id-token: write    # REQUIRED: OIDC token is exchanged for the Claude GitHub App token (repo write)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
      - name: Run Claude Code
        uses: anthropics/claude-code-action@9dd8b95a392eb34b6f5fb56cf5a64cb735912d4b  # v1 (v1.0.150)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-8"
